apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      serviceAccountName: vault-sa
      containers:
        - name: paperclip
          image: ghcr.io/paperclipai/paperclip@sha256:defa5d9f930292b472969d336f849482de2064fe2af4759c7e982635a3e7621e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
          command: ["sh", "-c"]
          args:
            - |
              chown -R node:node /paperclip
              mkdir -p /paperclip/bin
              cat > /paperclip/.n8n-mcp.json <<JSON
              {"mcpServers":{"n8n-local":{"type":"http","url":"${N8N_MCP_URL}","headers":{"Authorization":"Bearer ${N8N_MCP_BEARER}"}},"n8n-ey":{"type":"stdio","command":"npx","args":["-y","n8n-mcp"],"env":{"MCP_MODE":"stdio","LOG_LEVEL":"error","DISABLE_CONSOLE_OUTPUT":"true","N8N_API_URL":"${N8N_API_URL}","N8N_API_KEY":"${N8N_API_KEY}"}}}}
              JSON
              cat > /paperclip/bin/claude <<'SH'
              #!/bin/sh
              exec /usr/local/bin/claude --mcp-config /paperclip/.n8n-mcp.json "$@"
              SH
              chmod 755 /paperclip/bin/claude
              chmod 600 /paperclip/.n8n-mcp.json
              chown -R node:node /paperclip/bin /paperclip/.n8n-mcp.json
              exec /usr/local/bin/docker-entrypoint.sh sh -c '
                export PATH=/paperclip/bin:$PATH
                export DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD}@homelabcluster-rw.homelab-pg.svc.cluster.local:5432/paperclip"
                exec node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
              '
          env:
            - name: PORT
              value: "3100"
            - name: HOST
              value: "0.0.0.0"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_HOME
              value: /paperclip
            - name: PAPERCLIP_INSTANCE_ID
              value: default
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: authenticated
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: private
            - name: PAPERCLIP_BIND
              value: custom
            - name: PAPERCLIP_BIND_HOST
              value: "0.0.0.0"
            - name: PAPERCLIP_PUBLIC_URL
              value: "https://paperclip.famcr.org"
            - name: PAPERCLIP_API_URL
              value: "https://paperclip.famcr.org"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: paperclip-user
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-user
                  key: password
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: better-auth-secret
            - name: PAPERCLIP_SECRETS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: secrets-master-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: openai-api-key
            - name: N8N_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: n8n-mcp-url
            - name: N8N_MCP_BEARER
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: n8n-mcp-bearer
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: n8n-api-key
            - name: N8N_API_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-keys
                  key: n8n-api-url
          volumeMounts:
            - name: data
              mountPath: /paperclip
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
              httpHeaders:
                - name: Host
                  value: paperclip.famcr.org
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
              httpHeaders:
                - name: Host
                  value: paperclip.famcr.org
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "15Gi"
              cpu: "1500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
