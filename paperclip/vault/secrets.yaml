---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  namespace: paperclip
  name: paperclip-dynamic
spec:
  vaultAuthRef: vault-auth
  rolloutRestartTargets:
    - kind: Deployment
      name: paperclip
  mount: database
  path: creds/paperclip-dynamic
  destination:
    create: true
    name: paperclip-user

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  namespace: paperclip
  name: vault-paperclip
spec:
  vaultAuthRef: vault-auth
  rolloutRestartTargets:
    - kind: Deployment
      name: paperclip
  mount: kv
  type: kv-v2
  path: apps/paperclip
  refreshAfter: 60s
  destination:
    create: true
    name: paperclip-keys
    overwrite: true
